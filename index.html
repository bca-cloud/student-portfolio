<!DOCTYPE html>
<html>
<head>
    <title>Student Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(to right, #ef34b7, #907ec7);
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .profile {
            background: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .profile img {
            border-radius: 50%;
            border: 4px solid #fe4fdb;
        }

        .skills {
            margin-top: 10px;
        }

        .skill {
            display: inline-block;
            background: linear-gradient(45deg, #f64bd4, #fe00cb);
            color: white;
            padding: 6px 12px;
            margin: 5px;
            border-radius: 15px;
            font-size: 14px;
            transition: 0.3s;
        }

        .skill:hover {
            transform: scale(1.1);
            background: #e230ac;
        }

        form {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        button {
            background: #e54cb2;
            color: white;
            border: none;
            cursor: pointer;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        #msg {
            text-align: center;
            color: rgb(241, 63, 205);
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>NISHA SHARON</h1>
    <p>KRISTU JAYANTI UNIVERSITY</p>
</header>

<div class="container">

    <!-- Profile with Skills -->
    <div class="profile">
        <img src="photo.jpg" width="120">

        <h2>NISHA SHARON</h2>
        <p>BCA CLOUD COMPUTING</p>

        <h3>My Skills</h3>
        <div class="skills">
            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
            <span class="skill">JavaScript</span>
            <span class="skill">Node.js</span>
            <span class="skill">MongoDB</span>
        </div>
    </div>

    <!-- Success Message -->
    <p id="msg"></p>

    <!-- Contact Form -->
    <form id="form">
        <h2>YOUR MESSAGE</h2>

        <input type="text" id="name" placeholder="Enter Name" required>
        <input type="email" id="email" placeholder="Enter Email" required>
        <input type="text" id="message" placeholder="Enter Message" required>

        <button type="submit">Submit</button>
    </form>

    <!-- Data Display -->
    <div class="cards" id="data"></div>

</div>

<script>
const form = document.getElementById("form");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const student = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };

    await fetch("http://localhost:5000/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(student)
    });

    document.getElementById("msg").innerText = "Message Submitted Successfully!";
    form.reset();
    loadData();

    setTimeout(() => {
        document.getElementById("msg").innerText = "";
    }, 3000);
});

async function loadData() {
    const res = await fetch("http://localhost:5000/students");
    const data = await res.json();

    document.getElementById("data").innerHTML =
        data.map(d => `
        <div class="card">
            <h3>${d.name}</h3>
            <p><b>Email:</b> ${d.email}</p>
            <p><b>Message:</b> ${d.message}</p>
        </div>
        `).join("");
}

loadData();
</script>

</body>
</html>
