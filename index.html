<!DOCTYPE html>
<html>
<head>
    <title>Student Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .profile {
            background: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .profile img {
            border-radius: 50%;
            border: 4px solid #4facfe;
            transition: 0.3s;
        }

        .profile img:hover {
            transform: scale(1.1);
        }

        .skills {
            margin-top: 10px;
        }

        .skill {
            display: inline-block;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .skill:hover {
            transform: scale(1.1);
            background: #007bff;
        }

        form {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>🌟 Aparna</h1>
    <p>Your College Name</p>
</header>

<div class="container">

    <!-- Profile -->
    <div class="profile">
        <img src="photo.jpg" width="130">

        <h2>Aparna</h2>
        <p><b>Roll No:</b> 25BCLB58</p>
        <p><b>Course:</b> BCA</p>
        <p><b>College:</b> Your College Name</p>
        <p><b>Email:</b> your@email.com</p>
    </div>

    <!-- Skills -->
    <div class="profile">
        <h2>My Skills</h2>
        <div class="skills">
            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
            <span class="skill">JavaScript</span>
            <span class="skill">Node.js</span>
            <span class="skill">MongoDB</span>
        </div>
    </div>

    <!-- Form -->
    <form id="form">
        <h2>Add Student Info</h2>

        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="course" placeholder="Course">
        <input type="text" id="skills" placeholder="Skills">
        <input type="text" id="rollno" placeholder="Roll No">
        <input type="text" id="college" placeholder="College">

        <button type="submit">Submit</button>
    </form>

    <!-- Data -->
    <div class="cards" id="data"></div>

</div>

<script>
const form = document.getElementById("form");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const student = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        course: document.getElementById("course").value,
        skills: document.getElementById("skills").value,
        rollno: document.getElementById("rollno").value,
        college: document.getElementById("college").value
    };

    await fetch("http://localhost:5000/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(student)
    });

    alert("Saved!");
    loadData();
});

async function loadData() {
    const res = await fetch("http://localhost:5000/students");
    const data = await res.json();

    document.getElementById("data").innerHTML =
        data.map(d => `
        <div class="card">
            <h3>${d.name}</h3>
            <p>${d.email}</p>
            <p>${d.course}</p>
            <p>${d.skills}</p>
            <p>${d.rollno}</p>
            <p>${d.college}</p>
        </div>
        `).join("");
}

loadData();
</script>

</body>
</html>
